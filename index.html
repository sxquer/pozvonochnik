  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  const loadingStatus = document.getElementById('__bundler_loading_status');
  function setStatus(msg) {
    if (loadingStatus) loadingStatus.textContent = msg;
    else if (loading) loading.textContent = msg;
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Загружаем материалы и мягко собираем страницу...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Открываем страницу...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 padding:34px 28px;\">\n          <div style=\"font-family:'Cormorant',serif; font-size:46px; line-height:1; color:var(--seal);\">浅息<\/div>\n          <h3 style=\"margin:18px 0 8px; font-size:17px; font-weight:600;\">Поверхностное дыхание<\/h3>\n          <p style=\"margin:0; font-size:14.5px; line-height:1.6; color:var(--ink2); font-weight:300;\">Зажатая грудная клетка и диафрагма — меньше кислорода, меньше внутреннего ресурса.<\/p>\n        <\/div>\n        <div style=\"background:var(--paper); padding:34px 28px;\">\n          <div style=\"font-family:'Cormorant',serif; font-size:46px; line-height:1; color:var(--seal);\">疲惫<\/div>\n          <h3 style=\"margin:18px 0 8px; font-size:17px; font-weight:600;\">Усталость без причины<\/h3>\n          <p style=\"margin:0; font-size:14.5px; line-height:1.6; color:var(--ink2); font-weight:300;\">Сон не восстанавливает, концентрация падает — ресурс не циркулирует, а застаивается.<\/p>\n        <\/div>\n      <\/div>\n    <\/div>\n  <\/section>\n\n  <!-- ============ WHAT IS IT (DARK) ============ -->\n  <section data-screen-label=\"Что это\" style=\"position:relative; z-index:1; background:var(--ink); color:var(--paper); padding:130px 24px 130px 96px; overflow:hidden;\">\n    <div data-parallax=\"\" style=\"position:absolute; left:-1vw; bottom:-8vh; font-family:'Ma Shan Zheng',serif; font-size:min(52vh,520px); line-height:1; color:var(--paper); opacity:.05; pointer-events:none; user-select:none;\">龜<\/div>\n    <div style=\"position:relative; max-width:1080px; margin:0 auto;\">\n      <div data-reveal=\"\" style=\"display:flex; align-items:center; gap:12px; font-size:12px; letter-spacing:.28em; text-transform:uppercase; margin-bottom:26px; color:rgba(241,237,228,.6);\">\n        <span style=\"font-family:'Ma Shan Zheng',serif; font-size:22px; letter-spacing:0; color:var(--paper);\">02<\/span>\n        <span style=\"width:34px; height:1px; background:rgba(241,237,228,.25);\"><\/span>\n        Искусство священной черепахи · 神 ; font-size:34px; line-height:1; color:var(--seal); flex:none; width:42px;\">参<\/span>\n            <div>\n              <h3 style=\"margin:0 0 8px; font-size:18px; font-weight:600;\">Подготовка к Малой орбите<\/h3>\n              <p style=\"margin:0; font-size:15px; line-height:1.65; color:rgba(241,237,228,.7); font-weight:300;\">Раскрытый, подвижный позвоночник — основа Малой космической орбиты, задающей циркуляцию энергии в теле.<\/p>\n            <\/div>\n          <\/div>\n        <\/div>\n\n        <div data-reveal=\"\" style=\"border:1px solid rgba(241,237,228,.2); padding:30px;\">\n          <p style=\"margin:0 0 18px; font-size:13px; letter-spacing:.2em; text-transform:uppercase; color:rgba(241,237,228,.55);\">Символ черепахи<\/p>\n          <p style=\"margin:0; font-family:'Cormorant',serif; font-style:italic; font-size:23px; line-height:1.45; color:var(--paper);\">Панцирь черепахи — её позвоночник. В даосской традиции черепаха означает долголетие и неподвижную, глубокую внутреннюю работу: снаружи покой, внутри — движение энергии.<\/p>\n        <\/div>\n      <\/div>\n    <\/div>\n  <\/section>\n\n  <!-- ============ BENEFITS ============ -->\n  <section data-screen-label=\"Что получишь\" style=\"position:relative; z-index:1; padding:120px 24px 120px 96px;\">\n    <div style=\"max-width:1080px; margin:0 auto;\">\n      <div data-reveal=\"\" style=\"display:flex; align-items:center; gap:12px; color:var(--ink2); font-size:12px; letter-spacing:.28em; text-transform:uppercase; margin-bottom:26px;\">\n        <span style=\"font-family:'Ma Shan Zheng',serif; font-size:22px; letter-spacing:0; color:var(--ink);\">03<\/span>\n        <span style=\"width:34px; height:1px; background:var(--line);\"><\/span>\n        Что вы получите\n      <\/div>\n      <h2 data-reveal=\"\" style=\"margin:0 0 64px; font-family:'Cormorant',serif; font-weight:500; font-size:clamp(34px,5.5vw,68px); line-height:1.02; max-width:820px;\">\n        Одна практика — <span style=\"font-style:i f (directWhatsappLink) {\n      directWhatsappLink.href = 'https://wa.me/' + whatsappPhone + '?text=' + encodeURIComponent(directWhatsappText);\n    }\n    if (form && ok) {\n      form.addEventListener('submit', e => {\n        e.preventDefault();\n        const data = new FormData(form);\n        const name = (data.get('name') || '').toString().trim();\n        const email = (data.get('email') || '').toString().trim();\n        const phone = (data.get('phone') || '').toString().trim();\n        const lines = [\n          'Здравствуйте! Хочу записаться на мастер-класс «Разблокировка позвоночника».',\n          name ? 'Имя: ' + name : '',\n          phone ? 'Телефон: ' + phone : '',\n          email ? 'E-mail: ' + email : ''\n        ].filter(Boolean);\n        window.location.href = 'https://wa.me/' + whatsappPhone + '?text=' + encodeURIComponent(lines.join('\\n'));\n      });\n    }\n\n    // hide rail on small screens\n    const rail = root.querySelector('[data-spine]');\n    if (rail && window.innerWidth < 900) rail.style.display = 'none';\n\n    this._motionFallback = setTimeout(() => root.classList.add('rb-motion-fallback', 'rb-ready'), 4500);\n    this._initGsap();\n    this._initChar();\n  }\n\n  _initChar() {\n    const root = this._root;\n    const t = root.querySelector('[data-ji-target]');\n    if (!t) return;\n    const go = () => {\n      if (!window.HanziWriter) { this._ct = setTimeout(go, 100); return; }\n      const sz = Math.min(t.clientWidth, t.clientHeight) || 200;\n      t.textContent = '';\n      try {\n        const w = window.HanziWriter.create(t, '脊', {\n          width: sz, height: sz, padding: 2,\n          showOutline: false, showCharacter: false,\n          strokeColor: 'rgba(26,23,20,0.66)',\n          strokeAnimationSpeed: 0.85, delayBetweenStrokes: 150,\n          charDataLoader: function (char, onComplete) { onComplete({\"strokes\": [\"M 263 710 Q 300 691 339 668 Q 352 661 364 663 Q 371 664 373 676 Q 374 688 363 709 Q 354 728 321 737 Q 246 750 235 743 Q 232 739 235 729 Q 239 722 263 710 Z\", \"M 201 569 Q 191 566 189 557 Q 188 545 197 539 Q 218 527 248 514 Q 258 513 267 520 Q 279 533 356 589 Q 366 596 374 604 Q 384 611 384 620 Q 380 624 369 621 Q 233 570 201 569 Z\", \"M 670 771 Q 639 743 582 703 Q 575 699 579 691 Q 585 688 593 690 Q 684 724 729 736 Q 745 736 744 746 Q 743 762 730 782 Q 718 801 699 809 Q 686 812 683 795 Q 682 782 670 771 Z\", \"M 606 647 Q 655 619 714 578 Q 730 565 742 565 Q 749 566 752 574 Q 759 587 742 617 Q 726 653 602 670 Q 595 671 595 663 Q 596 653 606 647 Z\", \"M 351 389 Q 447 501 480 607 Q 484 619 488 629 L 497 653 Q 521 725 545 762 Q 558 781 542 793 Q 497 841 466 835 Q 450 832 455 814 Q 482 735 398 550 Q 392 540 386 527 Q 299 377 133 298 Q 114 288 95 278 Q 79 269 92 265 Q 108 262 148 271 Q 220 290 277 331 Q 302 347 323 363 L 351 389 Z\", \"M 488 629 Q 602 490 746 343 Q 768 319 805 322 Q 929 329 967 336 Q 979 339 980 345 Q 980 352 962 358 Q 782 404 729 448 Q 623 532 497 653 C 475 674 469 652 488 629 Z\", \"M 374 162 Q 375 205 380 238 L 382 266 Q 386 321 389 341 Q 389 345 389 349 C 390 366 390 366 377 375 Q 374 381 351 389 C 323 400 314 392 323 363 Q 357 258 312 94 Q 290 42 293 28 Q 294 -2 311 -22 Q 318 -35 328 -30 Q 370 -3 371 126 Q 371 130 372 133 L 374 162 Z\", \"M 389 349 Q 557 382 579 373 Q 592 367 592 338 Q 608 172 601 43 Q 600 16 585 11 Q 576 8 530 14 Q 517 17 518 8 Q 519 1 535 -9 Q 566 -37 590 -67 Q 603 -82 617 -81 Q 633 -77 653 -30 Q 677 18 672 65 Q 662 180 653 287 Q 649 329 666 362 Q 678 378 664 392 Q 646 408 607 422 Q 589 431 542 411 Q 391 378 377 375 C 348 369 360 343 389 349 Z\", \"M 380 238 Q 384 238 391 238 Q 470 250 530 256 Q 554 260 545 272 Q 535 287 509 292 Q 482 298 382 266 C 353 257 350 238 380 238 Z\", \"M 372 133 Q 376 133 383 133 Q 474 146 541 152 Q 565 155 557 168 Q 547 183 521 189 Q 491 195 374 162 C 345 154 342 133 372 133 Z\"], \"medians\": [[[240, 736], [320, 710], [339, 699], [358, 677]], [[204, 554], [250, 547], [376, 618]], [[696, 796], [704, 762], [586, 696]], [[604, 661], [705, 617], [727, 599], [739, 579]], [[467, 821], [491, 798], [503, 774], [448, 596], [387, 479], [337, 413], [258, 345], [152, 288], [97, 271]], [[501, 645], [501, 631], [604, 524], [717, 417], [769, 377], [814, 361], [971, 344]], [[356, 375], [359, 234], [323, -19]], [[380, 369], [400, 362], [463, 380], [574, 398], [604, 392], [627, 370], [624, 313], [637, 87], [632, 14], [610, -24], [526, 7]], [[386, 245], [418, 260], [467, 269], [512, 273], [535, 266]], [[378, 140], [411, 156], [479, 167], [523, 170], [546, 163]]], \"radStrokes\": [6, 7, 8, 9]}); }\n        });\n        root.classList.add('rb-ji-ready');\n        this._jiWriter = w;\n        const play = () => { try { w.animateCharacter(); } catch (e) {} };\n        this._jt = setTimeout(play, 1300);\n        // replay each time the hero scrolls back into view from above\n        if (window.ScrollTrigger) {\n          window.ScrollTrigger.create({\n            trigger: root.querySelector('section'),\n            start: 'top 40%',\n            onEnterBack: () => { try { w.hideCharacter(); play(); } catch (e) {} }\n          });\n        }\n      } catch (e) {\n        t.textContent = '脊';\n        root.classList.add('rb-ji-ready');\n      }\n    };\n    go();\n  }\n\n  _initGsap() {\n    const tick = () => {\n      if (window.gsap && window.ScrollTrigger) { this._runGsap(); }\n      else { this._t = setTimeout(tick, 80); }\n    };\n    tick();\n  }\n\n  _runGsap() {\n    const root = this._root;\n    if (this._motionFallback) clearTimeout(this._motionFallback);\n    const gsap = window.gsap;\n    const ST = window.ScrollTrigger;\n    gsap.registerPlugin(ST);\n    ST.getAll().forEach(t => t.kill());\n\n    // hero text entrance\n    gsap.to(root.querySelectorAll('[data-hero-line]'), {\n      opacity: 1, y: 0, filter: 'blur(0px)', duration: 1.25, ease: 'power3.out', stagger: 0.13, delay: 0.15\n    });\n\n    // enso brush draw\n    const enso = root.querySelector('#enso-path');\n    if (enso) {\n      const l = enso.getTotalLength();\n      gsap.fromTo(enso, { strokeDasharray: l, strokeDashoffset: l, opacity: 0 },\n        { strokeDashoffset: 0, opacity: 1, duration: 2.4, ease: 'power2.inOut', delay: 0.3 });\n    }\n\n    // section reveals: desktop gets motion; mobile keeps content visible to avoid Safari blank sections.\n    const isCompact = window.matchMedia && window.matchMedia('(max-width: 760px)').matches;\n    gsap.set(root.querySelectorAll('#zapis [data-reveal]'), { autoAlpha: 1, y: 0, clearProps: 'visibility,opacity,transform' });\n    if (isCompact) {\n      gsap.set(root.querySelectorAll('[data-reveal]'), { autoAlpha: 1, y: 0, clearProps: 'visibility,opacity,transform,filter,willChange' });\n      root.querySelectorAll('[data-stagger]').forEach(grp => {\n        gsap.set(gsap.utils.toArray(grp.children), { autoAlpha: 1, y: 0, clearProps: 'visibility,opacity,transform,filter,willChange' });\n      });\n    } else {\n      const revealEls = gsap.utils.toArray(root.querySelectorAll('[data-reveal]')).filter(el => !el.closest('#zapis'));\n      gsap.set(revealEls, { autoAlpha: 0, y: 46, force3D: true, willChange: 'transform, opacity' });\n      revealEls.forEach(el => {\n        gsap.to(el, { autoAlpha: 1, y: 0, duration: 1.05, ease: 'power3.out', overwrite: 'auto', clearProps: 'willChange',\n          scrollTrigger: { trigger: el, start: 'top 88%', once: true } });\n      });\n\n      // staggered groups\n      root.querySelectorAll('[data-stagger]').forEach(grp => {\n        const items = gsap.utils.toArray(grp.children);\n        gsap.set(items, { autoAlpha: 0, y: 40, force3D: true, willChange: 'transform, opacity' });\n        gsap.to(items, { autoAlpha: 1, y: 0, duration: 0.85, ease: 'power3.out', stagger: 0.1, overwrite: 'auto', clearProps: 'willChange',\n          scrollTrigger: { trigger: grp, start: 'top 84%', once: true } });\n      });\n    }\n\n    // parallax decorative chars\n    root.querySelectorAll('[data-parallax]').forEach(el => {\n      const sec = el.closest('section') || el;\n      gsap.to(el, { yPercent: -16, ease: 'none',\n        scrollTrigger: { trigger: sec, start: 'top bottom', end: 'bottom top', scrub: true } });\n    });\n\n    // spine river — draw + travelling node tied to page scroll\n    const fg = root.querySelector('#spine-fg');\n    const dot = root.querySelector('[data-spine-dot]');\n    const rail = root.querySelector('[data-spine]');\n    if (fg && rail && rail.style.display !== 'none') {\n      const len = fg.getTotalLength();\n      gsap.set(fg, { strokeDasharray: len, strokeDashoffset: len });\n      ST.create({\n        trigger: document.body, start: 'top top', end: 'bottom bottom', scrub: 0.5,\n        onUpdate: self => {\n          const p = self.progress;\n          fg.style.strokeDashoffset = len * (1 - p);\n          if (dot) {\n            const pt = fg.getPointAtLength(len * p);\n            const w = rail.clientWidth, h = rail.clientHeight;\n            dot.style.transform = 'translate(' + (pt.x / 60) * w + 'px,' + (pt.y / 1000) * h + 'px)';\n          }\n        }\n      });\n    }\n\n    ST.refresh();\n    if (this._bootReady) clearTimeout(this._bootReady);\n    this._bootReady = setTimeout(() => root.classList.add('rb-ready'), 450);\n  }\n\n  componentWillUnmount() {\n    if (this._t) clearTimeout(this._t);\n    if (this._ct) clearTimeout(this._ct);\n    if (this._jt) clearTimeout(this._jt);\n    if (this._motionFallback) clearTimeout(this._motionFallback);\n    if (this._bootReady) clearTimeout(this._bootReady);\n    if (window.ScrollTrigger) window.ScrollTrigger.getAll().forEach(t => t.kill());\n  }\n}\n<\/script>\n\n\n<\/body><\/html>"
